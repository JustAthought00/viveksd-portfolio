<html lang="en">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070b14;
      --bg2: #0d1424;
      --surface: #111827;
      --border: #1e2d45;
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --accent-glow: rgba(59,130,246,0.15);
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'Space Mono', monospace;
      --display: 'Syne', sans-serif;
      --body: 'Inter', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      overflow-x: hidden;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOcta[...]
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

    /* Grid background */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    .glow-orb {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      top: -100px;
      right: -100px;
      animation: orbFloat 8s ease-in-out infinite;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-30px, 30px); }
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(7,11,20,0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--accent2);
      letter-spacing: 0.05em;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent2); }

    /* SECTIONS */
    section {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 6rem 2rem;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 8rem;
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .hero-tag {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .hero-tag::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--accent);
    }
    .hero h1 {
      font-family: var(--display);
      font-size: clamp(3.5rem, 8vw, 7rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }
    .hero h1 span {
      background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 50%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 520px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
      font-weight: 300;
    }
    .hero-badges {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }
    .badge {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 0.35rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--muted);
      letter-spacing: 0.06em;
      background: var(--surface);
    }
    .badge.active {
      border-color: var(--accent);
      color: var(--accent2);
      background: var(--accent-glow);
    }
    .hero-cta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .btn-primary {
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.9rem 2rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-primary:hover {
      background: var(--accent2);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59,130,246,0.3);
    }
    .btn-ghost {
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.9rem 2rem;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent2);
      transform: translateY(-2px);

    /* SECTION HEADERS */

      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .section-title {
      font-family: var(--display);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }
    .section-desc {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
      max-width: 480px;
      margin-bottom: 3.5rem;
      font-weight: 300;
    }
    .section-divider {

      height: 1px;
      background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);

    .tech-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      transition: all 0.25s;
      cursor: default;
    }
    .tech-card:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(59,130,246,0.12);
    }
    .tech-icon {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }
    .tech-name {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-align: center;
    }

    /* PROJECTS */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }
    .project-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .project-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(59,130,246,0.1);
    }
    .project-card:hover::before { opacity: 1; }
    .project-header {

      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .project-icon {
      font-size: 1.5rem;
    }
    .project-links {

      gap: 0.5rem;

    .project-link {

      font-size: 0.7rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: all 0.2s;
    }
    .project-link:hover {
      color: var(--accent2);
      border-color: var(--accent);
    }
    .project-name {
      font-family: var(--display);
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .project-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 1.25rem;
      font-weight: 300;
    }
    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .project-tag {
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0.25rem 0.6rem;
      background: var(--accent-glow);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 4px;
      color: var(--accent2);
      letter-spacing: 0.04em;
    }

    /* EXPERIENCE */
    .exp-list { display: flex; flex-direction: column; gap: 1.5rem; }
    .exp-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      display: flex;
      gap: 1.5rem;
      transition: all 0.25s;
    }
    .exp-card:hover {
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(59,130,246,0.08);
    }
    .exp-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 6px;
      flex-shrink: 0;
      box-shadow: 0 0 8px var(--accent);
    }
    .exp-content { flex: 1; }
    .exp-role {
      font-family: var(--display);
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .exp-org {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent2);
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }
    .exp-period {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .exp-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.65;
      font-weight: 300;
    }

    /* BLOG */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .blog-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      transition: all 0.25s;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }
    .blog-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(59,130,246,0.1);
    }
    .blog-tag {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .blog-title {
      font-family: var(--display);
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text);
      line-height: 1.4;
    }
    .blog-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1rem;
      font-weight: 300;
    }
    .blog-meta {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);

      text-align: center;
      padding: 3rem;
      border: 1px dashed var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    /* CONTACT */
    .contact-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }
    .contact-info { display: flex; flex-direction: column; gap: 1.5rem; }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .contact-item:hover {
      border-color: var(--accent);
      transform: translateX(4px);
    }
    .contact-item-icon {
      font-size: 1.2rem;
      width: 36px;
      text-align: center;
    }
    .contact-item-text { flex: 1; }
    .contact-item-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }
    .contact-item-value {
      font-size: 0.88rem;
      color: var(--text);
    }
    .contact-form { display: flex; flex-direction: column; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
    .form-input, .form-textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      color: var(--text);
      font-family: var(--body);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--accent);
    }
    .form-textarea { min-height: 120px; }

    /* FOOTER */
    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
    }
    .footer-text {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .footer-text span { color: var(--accent2); }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.6s ease forwards; }
    .fade-up-1 { animation-delay: 0.1s; opacity: 0; }
    .fade-up-2 { animation-delay: 0.2s; opacity: 0; }
    .fade-up-3 { animation-delay: 0.3s; opacity: 0; }
    .fade-up-4 { animation-delay: 0.4s; opacity: 0; }
    .fade-up-5 { animation-delay: 0.5s; opacity: 0; }

    /* CURSOR DOT */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      nav { padding: 1rem; }
      .nav-links { display: none; }
      .contact-wrapper { grid-template-columns: 1fr; gap: 2rem; }
      section { padding: 4rem 1.25rem; }
      .hero { padding: 0 1.25rem; padding-top: 7rem; }
    }
  </style>
</head>

function TypeWriter({ text }) {
  const [displayed, setDisplayed] = useState('');
  useEffect(() => {
    let i = 0;
    const interval = setInterval(() => {
      setDisplayed(text.slice(0, i));
      i++;
      if (i > text.length) clearInterval(interval);
    }, 60);
    return () => clearInterval(interval);
  }, [text]);
  return (
    <span>
      {displayed}<span className="cursor"></span>
    </span>
  );
}

        </h1>
        <p className="hero-sub fade-up fade-up-3">
          Full Stack Developer & AI Engineer from Bangalore. Building intelligent web experiences — from React frontends to Python-powered AI backends.
        </p>
        <div className="hero-badges fade-up fade-up-4">
          <span className="badge active">● Open to Work</span>
          <span className="badge">📍 Bangalore, India</span>
          <span className="badge">🎓 CSE student </span>
          <span className="badge">VTU · 2027</span>
        </div>
        <div className="hero-cta fade-up fade-up-5">
          <a href="#contact" className="btn-primary">Get in touch →</a>
          <a href="#projects" className="btn-ghost">View Projects</a>
        </div>
      </div>

      {/* TECH STACK */}
      <section id="stack">
        <div className="section-divider"></div>
        <div className="section-label">// tech arsenal</div>
        <h2 className="section-title">My Stack</h2>
        <p className="section-desc">Tools and technologies I work with to build full-stack and AI-powered applications.</p>
        <div className="tech-grid">
          {TECH_STACK.map(tech => (
            <div className="tech-card" key={tech.name}>
              <img className="tech-icon" src={tech.icon} alt={tech.name} />
              <span className="tech-name">{tech.name}</span>
            </div>
          ))}
        </div>
      </section>

      {/* PROJECTS */}
      <section id="projects">
        <div className="section-divider"></div>
        <div className="section-label">// what i've built</div>
        <h2 className="section-title">Projects</h2>
        <p className="section-desc">A mix of hackathon builds, academic projects, and personal experiments.</p>
        <div className="projects-grid">
          {PROJECTS.map(p => (
            <div className="project-card" key={p.name}>
              <div className="project-header">
                <div className="project-icon">{p.icon}</div>
                <div className="project-links">
                  {p.github && <a href={p.github} target="_blank" className="project-link">GitHub</a>}
                  {p.live && <a href={p.live} target="_blank" className="project-link">Live ↗</a>}
                </div>
              </div>
              <div className="project-name">{p.name}</div>
              <div className="project-desc">{p.desc}</div>
              <div className="project-tags">
                {p.tags.map(t => <span className="project-tag" key={t}>{t}</span>)}
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* EXPERIENCE */}
      <section id="experience">
        <div className="section-divider"></div>
        <div className="section-label">// journey so far</div>
        <h2 className="section-title">Experience</h2>
        <p className="section-desc">Competitions, education, and things that have shaped me as a developer.</p>
        <div className="exp-list">
          {EXPERIENCE.map(e => (
            <div className="exp-card" key={e.role}>
              <div className="exp-dot"></div>
              <div className="exp-content">
                <div className="exp-role">{e.role}</div>
                <div className="exp-org">{e.org}</div>
                <div className="exp-period">{e.period}</div>
                <div className="exp-desc">{e.desc}</div>
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* BLOG */}
      <section id="blog">
        <div className="section-divider"></div>
        <div className="section-label">// thoughts & writing</div>
        <h2 className="section-title">Blog</h2>
        <p className="section-desc">Writing about things I learn — AI, web dev, and building stuff.</p>
        <div className="blog-grid">
          {BLOG_POSTS.map(post => (
            <div className="blog-card" key={post.title}>
              <div className="blog-tag">{post.tag}</div>
              <div className="blog-title">{post.title}</div>
              <div className="blog-desc">{post.desc}</div>
              <div className="blog-meta">{post.date}</div>
            </div>
          ))}
        </div>
      </section>

      {/* CONTACT */}
      <section id="contact">
        <div className="section-divider"></div>
        <div className="section-label">// let's connect</div>
        <h2 className="section-title">Get in Touch</h2>
        <p className="section-desc">Open to internships, collaborations, and interesting projects. Let's build something together.</p>
        <div className="contact-wrapper">
          <div className="contact-info">
            <a href="mailto:vivek@viveksd.dev" className="contact-item">
              <div className="contact-item-icon">📧</div>
              <div className="contact-item-text">
                <div className="contact-item-label">Email</div>
                <div className="contact-item-value">vivek@viveksd.dev</div>
              </div>
            </a>
            <a href="https://github.com/JustAthought00" target="_blank" className="contact-item">
              <div className="contact-item-icon">🐙</div>
              <div className="contact-item-text">
                <div className="contact-item-label">GitHub</div>
                <div className="contact-item-value">JustAthought00</div>
              </div>
            </a>
            <a href="https://www.linkedin.com/in/viveksd/" target="_blank" className="contact-item">
              <div className="contact-item-icon">💼</div>
              <div className="contact-item-text">
                <div className="contact-item-label">LinkedIn</div>
                <div className="contact-item-value">linkedin.com/in/viveksd</div>
              </div>
            </a>
            <a href="https://x.com/sd5_vivek" target="_blank" className="contact-item">
              <div className="contact-item-icon">𝕏</div>
              <div className="contact-item-text">
                <div className="contact-item-label">Twitter / X</div>
                <div className="contact-item-value">@sd5_vivek</div>
              </div>
            </a>
          </div>
          <div className="contact-form">
            {sent ? (
              <div style={{padding: '2rem', textAlign: 'center', border: '1px solid var(--accent)', borderRadius: '12px', fontFamily: 'var(--mono)', color: 'var(--accent2)', fontSize: '0.85rem'}}>
                ✓ Message sent! I'll get back to you soon.
              </div>
            ) : (
              <>
                <div className="form-group">
                  <label className="form-label">name</label>
                  <input className="form-input" placeholder="Your name" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                </div>
                <div className="form-group">
                  <label className="form-label">email</label>
                  <input className="form-input" type="email" placeholder="your@email.com" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                </div>
                <div className="form-group">
                  <label className="form-label">message</label>
                  <textarea className="form-textarea" placeholder="What's on your mind?" value={formData.message} onChange={e => setFormData({...formData, message: e.target.value})}></textarea>
                </div>
                <button className="btn-primary" onClick={handleSubmit}>Send Message →</button>
              </>
            )}
          </div>
        </div>
      </section>

      <footer>
        <div className="footer-text">
          © 2026 <span>Vivek SD</span> · Built with React · Hosted on <span>viveksd.dev</span>
        </div>
      </footer>
    </>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
